name: Android Build (Full Pipeline)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  STORE_FILE_PATH: /tmp/keystore.jks
  BUILD_JSON_PATH: build.json

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    # -------------------------------
    # Checkout
    # -------------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # -------------------------------
    # Setup Java
    # -------------------------------
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: gradle

    # -------------------------------
    # Setup Node
    # -------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: npm

    # -------------------------------
    # Validate Secrets
    # -------------------------------
    - name: Check required secrets
      run: |
        if [ -z "${{ secrets.KEYSTORE_CONTENT }}" ]; then
          echo "Missing KEYSTORE_CONTENT"
          exit 1
        fi
        if [ -z "${{ secrets.BUILD_JSON_CONTENT }}" ]; then
          echo "Missing BUILD_JSON_CONTENT"
          exit 1
        fi

    # -------------------------------
    # Restore keystore
    # -------------------------------
    - name: Restore keystore + config
      run: |
        echo "${{ secrets.KEYSTORE_CONTENT }}" | base64 -d > $STORE_FILE_PATH
        echo "${{ secrets.BUILD_JSON_CONTENT }}" | base64 -d > $BUILD_JSON_PATH

    # -------------------------------
    # Install dependencies
    # -------------------------------
    - name: Install npm dependencies
      run: npm install

    - name: Install Cordova
      run: npm install -g cordova

    # -------------------------------
    # Project setup
    # -------------------------------
    - name: Run setup
      run: npm run setup

    # -------------------------------
    # Versioning
    # -------------------------------
    - name: Generate version
      id: version
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        VERSION="1.0.${SHORT_SHA}"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    # -------------------------------
    # Build APK
    # -------------------------------
    - name: Build APK
      run: |
        node utils/storage_manager.mjs y
        npm run build paid dev apk
        mv platforms/android/app/build/outputs/apk/debug/app-debug.apk app.apk

    # -------------------------------
    # Upload artifact
    # -------------------------------
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: acode-${{ steps.version.outputs.version }}
        path: app.apk

    # -------------------------------
    # Optional Release
    # -------------------------------
    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ steps.version.outputs.version }}
        name: Build ${{ steps.version.outputs.version }}
        files: app.apk
        prerelease: true
